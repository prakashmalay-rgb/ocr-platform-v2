version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ocr_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./apps/backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  workers:
    build:
      context: ./services/workers
    depends_on:
      - db
      - redis
    env_file:
      - .env

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  pgdata:
  redisdata:
